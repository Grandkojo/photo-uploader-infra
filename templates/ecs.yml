AWSTemplateFormatVersion: '2010-09-09'
Description: ECS Cluster, ALB, Task Definition, and Service for Photo Uploader

Parameters:
  ProjectName:
    Type: String
    Default: photo-uploader
  Environment:
    Type: String
    Default: prod
  ContainerImage:
    Type: String
    Description: ECR image URI

Resources:
  # CloudWatch Log Group
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/photo-uploader
      RetentionInDays: 30
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # IAM Roles
  ECSExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-ecs-execution-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: SecretsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - Fn::ImportValue: !Sub "${ProjectName}-DBHostSecretArn"
                  - Fn::ImportValue: !Sub "${ProjectName}-DBUserSecretArn"
              - Effect: Allow
                Action:
                  - ssm:GetParameters
                Resource:
                  - Fn::ImportValue: !Sub "${ProjectName}-DBPasswordSSMArn"
              - Effect: Allow
                Action:
                  - kms:Decrypt
                Resource: "*"
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub "ssm.${AWS::Region}.amazonaws.com"
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-ecs-task-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3PhotosAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                Resource: !Sub
                  - "${BucketArn}/*"
                  - BucketArn:
                      Fn::ImportValue: !Sub "${ProjectName}-PhotosBucketArn"
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # ECS Cluster
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub ${ProjectName}-cluster
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # Task Definition
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: photo-uploader
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: '512'
      Memory: '1024'
      ExecutionRoleArn: !GetAtt ECSExecutionRole.Arn
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      ContainerDefinitions:
        - Name: photo-uploader
          Image: !Ref ContainerImage
          # Placeholder command: runs a minimal HTTP server so the ALB health check passes
          # before the real app image is deployed via CodeDeploy.
          Command:
            - node
            - -e
            - "const http=require('http');http.createServer((_,r)=>{r.writeHead(200);r.end('OK')}).listen(3000)"
          PortMappings:
            - ContainerPort: 3000
              Protocol: tcp
          Environment:
            - Name: PORT
              Value: '3000'
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: S3_BUCKET
              Value:
                Fn::ImportValue: !Sub "${ProjectName}-PhotosBucket"
            - Name: CLOUDFRONT_DOMAIN
              Value:
                Fn::ImportValue: !Sub "${ProjectName}-CloudFrontDomain"
            - Name: DB_PORT
              Value: '5432'
            - Name: DB_NAME
              Value: photodb
          Secrets:
            - Name: DB_HOST
              ValueFrom:
                Fn::ImportValue: !Sub "${ProjectName}-DBHostSecretArn"
            - Name: DB_USER
              ValueFrom:
                Fn::ImportValue: !Sub "${ProjectName}-DBUserSecretArn"
            - Name: DB_PASSWORD
              ValueFrom:
                Fn::ImportValue: !Sub "${ProjectName}-DBPasswordSSMArn"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: /ecs/photo-uploader
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # Application Load Balancer
  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub ${ProjectName}-alb
      Type: application
      Scheme: internet-facing
      SecurityGroups:
        - Fn::ImportValue: !Sub "${ProjectName}-AlbSG"
      Subnets:
        - Fn::ImportValue: !Sub "${ProjectName}-PublicSubnet1"
        - Fn::ImportValue: !Sub "${ProjectName}-PublicSubnet2"
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # Target Groups (Blue and Green for CodeDeploy)
  BlueTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${ProjectName}-blue-tg
      Port: 3000
      Protocol: HTTP
      TargetType: ip
      VpcId:
        Fn::ImportValue: !Sub "${ProjectName}-VpcId"
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  GreenTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${ProjectName}-green-tg
      Port: 3000
      Protocol: HTTP
      TargetType: ip
      VpcId:
        Fn::ImportValue: !Sub "${ProjectName}-VpcId"
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref BlueTargetGroup

  ALBTestListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 8080
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref GreenTargetGroup

  # ECS Service
  ECSService:
    Type: AWS::ECS::Service
    DependsOn: ALBListener
    Properties:
      ServiceName: !Sub ${ProjectName}-service
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref TaskDefinition
      LaunchType: FARGATE
      DesiredCount: 1
      DeploymentController:
        Type: CODE_DEPLOY
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - Fn::ImportValue: !Sub "${ProjectName}-PrivateSubnet1"
            - Fn::ImportValue: !Sub "${ProjectName}-PrivateSubnet2"
          SecurityGroups:
            - Fn::ImportValue: !Sub "${ProjectName}-EcsSG"
          AssignPublicIp: DISABLED
      LoadBalancers:
        - ContainerName: photo-uploader
          ContainerPort: 3000
          TargetGroupArn: !Ref BlueTargetGroup
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # Auto Scaling
  AutoScalingTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MinCapacity: 1
      MaxCapacity: 4
      ResourceId: !Sub "service/${ECSCluster}/${ECSService.Name}"
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs

  ScaleUpPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub ${ProjectName}-scale-cpu
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref AutoScalingTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 70.0
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        ScaleInCooldown: 300
        ScaleOutCooldown: 60

Outputs:
  ALBDnsName:
    Value: !GetAtt ALB.DNSName
    Export:
      Name: !Sub ${ProjectName}-ALBDnsName

  ALBArn:
    Value: !Ref ALB
    Export:
      Name: !Sub ${ProjectName}-ALBArn

  ALBListenerArn:
    Value: !Ref ALBListener
    Export:
      Name: !Sub ${ProjectName}-ALBListenerArn

  ALBTestListenerArn:
    Value: !Ref ALBTestListener
    Export:
      Name: !Sub ${ProjectName}-ALBTestListenerArn

  BlueTargetGroupName:
    Value: !GetAtt BlueTargetGroup.TargetGroupName
    Export:
      Name: !Sub ${ProjectName}-BlueTargetGroupName

  GreenTargetGroupName:
    Value: !GetAtt GreenTargetGroup.TargetGroupName
    Export:
      Name: !Sub ${ProjectName}-GreenTargetGroupName

  ECSClusterName:
    Value: !Ref ECSCluster
    Export:
      Name: !Sub ${ProjectName}-ECSCluster

  ECSServiceName:
    Value: !GetAtt ECSService.Name
    Export:
      Name: !Sub ${ProjectName}-ECSServiceName

  TaskDefinitionArn:
    Value: !Ref TaskDefinition
    Export:
      Name: !Sub ${ProjectName}-TaskDefinitionArn
