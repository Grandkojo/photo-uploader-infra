AWSTemplateFormatVersion: '2010-09-09'
Description: CodeDeploy, CodePipeline, and EventBridge for Photo Uploader blue/green deployments

Parameters:
  ProjectName:
    Type: String
    Default: photo-uploader
  Environment:
    Type: String
    Default: prod

Resources:
  # CodeDeploy Application
  CodeDeployApp:
    Type: AWS::CodeDeploy::Application
    Properties:
      ApplicationName: !Sub ${ProjectName}-app
      ComputePlatform: ECS

  # CodeDeploy Deployment Group (blue/green)
  CodeDeployDeploymentGroup:
    Type: AWS::CodeDeploy::DeploymentGroup
    Properties:
      ApplicationName: !Ref CodeDeployApp
      DeploymentGroupName: !Sub ${ProjectName}-dg
      ServiceRoleArn: !GetAtt CodeDeployRole.Arn
      DeploymentConfigName: CodeDeployDefault.ECSAllAtOnce
      DeploymentStyle:
        DeploymentType: BLUE_GREEN
        DeploymentOption: WITH_TRAFFIC_CONTROL
      BlueGreenDeploymentConfiguration:
        DeployReadyOption:
          ActionOnTimeout: CONTINUE_DEPLOYMENT
          WaitTimeInMinutes: 0
        TerminateBlueInstancesOnDeploymentSuccess:
          Action: TERMINATE
          TerminationWaitTimeInMinutes: 5
      LoadBalancerInfo:
        TargetGroupPairInfoList:
          - TargetGroups:
              - Name: !ImportValue !Sub ${ProjectName}-BlueTargetGroupName
              - Name: !ImportValue !Sub ${ProjectName}-GreenTargetGroupName
            ProdTrafficRoute:
              ListenerArns:
                - !ImportValue !Sub ${ProjectName}-ALBListenerArn
            TestTrafficRoute:
              ListenerArns:
                - !ImportValue !Sub ${ProjectName}-ALBTestListenerArn
      ECSServices:
        - ClusterName: !ImportValue !Sub ${ProjectName}-ECSCluster
          ServiceName: !ImportValue !Sub ${ProjectName}-ECSServiceName

  # IAM Roles
  CodeDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-codedeploy-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codedeploy.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSCodeDeployRoleForECS
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  CodePipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-codepipeline-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodePipelinePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketVersioning
                Resource:
                  - !Sub
                    - ${BucketArn}
                    - BucketArn: !Sub arn:aws:s3:::${ProjectName}-artifacts-${AWS::AccountId}
                  - !Sub
                    - ${BucketArn}/*
                    - BucketArn: !Sub arn:aws:s3:::${ProjectName}-artifacts-${AWS::AccountId}
              - Effect: Allow
                Action:
                  - codedeploy:CreateDeployment
                  - codedeploy:GetDeployment
                  - codedeploy:GetDeploymentConfig
                  - codedeploy:GetApplicationRevision
                  - codedeploy:RegisterApplicationRevision
                Resource: '*'
              - Effect: Allow
                Action:
                  - ecs:DescribeServices
                  - ecs:DescribeTaskDefinition
                  - ecs:DescribeTasks
                  - ecs:ListTasks
                  - ecs:RegisterTaskDefinition
                  - ecs:UpdateService
                Resource: '*'
              - Effect: Allow
                Action:
                  - ecr:DescribeImages
                Resource: '*'
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: '*'
                Condition:
                  StringEqualsIfExists:
                    iam:PassedToService:
                      - ecs-tasks.amazonaws.com
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-eventbridge-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: StartPipelinePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: codepipeline:StartPipelineExecution
                Resource: !Sub arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:${ProjectName}-pipeline
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # CodePipeline
  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Sub ${ProjectName}-pipeline
      RoleArn: !GetAtt CodePipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Sub ${ProjectName}-artifacts-${AWS::AccountId}
      Stages:
        - Name: Source
          Actions:
            - Name: ECRSource
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: ECR
                Version: '1'
              Configuration:
                RepositoryName: !Ref ProjectName
                ImageTag: latest
              OutputArtifacts:
                - Name: SourceOutput
              RunOrder: 1
        - Name: Deploy
          Actions:
            - Name: BlueGreenDeploy
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CodeDeployToECS
                Version: '1'
              Configuration:
                ApplicationName: !Ref CodeDeployApp
                DeploymentGroupName: !Ref CodeDeployDeploymentGroup
                TaskDefinitionTemplateArtifact: SourceOutput
                TaskDefinitionTemplatePath: taskdef.json
                AppSpecTemplateArtifact: SourceOutput
                AppSpecTemplatePath: appspec.yml
                Image1ArtifactName: SourceOutput
                Image1ContainerName: IMAGE_URI
              InputArtifacts:
                - Name: SourceOutput
              RunOrder: 1
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # EventBridge rule: ECR image push → trigger pipeline
  ECRPushRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub ${ProjectName}-ecr-push-rule
      Description: Trigger CodePipeline when a new image is pushed to ECR
      EventPattern:
        source:
          - aws.ecr
        detail-type:
          - ECR Image Action
        detail:
          action-type:
            - PUSH
          result:
            - SUCCESS
          repository-name:
            - !Ref ProjectName
          image-tag:
            - latest
      State: ENABLED
      Targets:
        - Id: TriggerPipeline
          Arn: !Sub arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:${ProjectName}-pipeline
          RoleArn: !GetAtt EventBridgeRole.Arn

Outputs:
  PipelineName:
    Value: !Ref Pipeline
    Export:
      Name: !Sub ${ProjectName}-PipelineName

  CodeDeployAppName:
    Value: !Ref CodeDeployApp
    Export:
      Name: !Sub ${ProjectName}-CodeDeployApp

  CodeDeployDeploymentGroupName:
    Value: !Ref CodeDeployDeploymentGroup
    Export:
      Name: !Sub ${ProjectName}-CodeDeployDG
