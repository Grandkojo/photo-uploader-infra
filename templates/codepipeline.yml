AWSTemplateFormatVersion: '2010-09-09'
Description: CodeDeploy, CodePipeline, and EventBridge for Photo Uploader blue/green deployments

Parameters:
  ProjectName:
    Type: String
    Default: photo-uploader
  Environment:
    Type: String
    Default: prod
  GitHubOrg:
    Type: String
    Description: GitHub org/username owning the app repository
  GitHubRepo:
    Type: String
    Description: App repository name

Resources:
  # CodeDeploy Application
  CodeDeployApp:
    Type: AWS::CodeDeploy::Application
    Properties:
      ApplicationName: !Sub ${ProjectName}-app
      ComputePlatform: ECS

  # CodeDeploy Deployment Group (blue/green)
  CodeDeployDeploymentGroup:
    Type: AWS::CodeDeploy::DeploymentGroup
    Properties:
      ApplicationName: !Ref CodeDeployApp
      DeploymentGroupName: !Sub ${ProjectName}-dg
      ServiceRoleArn: !GetAtt CodeDeployRole.Arn
      DeploymentConfigName: CodeDeployDefault.ECSAllAtOnce
      DeploymentStyle:
        DeploymentType: BLUE_GREEN
        DeploymentOption: WITH_TRAFFIC_CONTROL
      BlueGreenDeploymentConfiguration:
        DeploymentReadyOption:
          ActionOnTimeout: CONTINUE_DEPLOYMENT
        TerminateBlueInstancesOnDeploymentSuccess:
          Action: TERMINATE
          TerminationWaitTimeInMinutes: 5
      LoadBalancerInfo:
        TargetGroupPairInfoList:
          - TargetGroups:
              - Name:
                  Fn::ImportValue: !Sub "${ProjectName}-BlueTargetGroupName"
              - Name:
                  Fn::ImportValue: !Sub "${ProjectName}-GreenTargetGroupName"
            ProdTrafficRoute:
              ListenerArns:
                - Fn::ImportValue: !Sub "${ProjectName}-ALBListenerArn"
            TestTrafficRoute:
              ListenerArns:
                - Fn::ImportValue: !Sub "${ProjectName}-ALBTestListenerArn"
      ECSServices:
        - ClusterName:
            Fn::ImportValue: !Sub "${ProjectName}-ECSCluster"
          ServiceName:
            Fn::ImportValue: !Sub "${ProjectName}-ECSServiceName"

  # IAM Roles
  CodeDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-codedeploy-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codedeploy.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSCodeDeployRoleForECS
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  CodePipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-codepipeline-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodePipelinePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketVersioning
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::${ProjectName}-artifacts-${AWS::AccountId}"
                  - !Sub "arn:aws:s3:::${ProjectName}-artifacts-${AWS::AccountId}/*"
              - Effect: Allow
                Action:
                  - codedeploy:CreateDeployment
                  - codedeploy:GetDeployment
                  - codedeploy:GetDeploymentConfig
                  - codedeploy:GetApplicationRevision
                  - codedeploy:RegisterApplicationRevision
                  - codedeploy:GetApplication
                  - codedeploy:GetDeploymentGroup
                  - codedeploy:ListDeploymentGroups
                Resource: '*'
              - Effect: Allow
                Action:
                  - ecs:DescribeServices
                  - ecs:DescribeTaskDefinition
                  - ecs:DescribeTasks
                  - ecs:ListTasks
                  - ecs:RegisterTaskDefinition
                  - ecs:UpdateService
                Resource: '*'
              - Effect: Allow
                Action:
                  - ecr:DescribeImages
                Resource: '*'
              - Effect: Allow
                Action:
                  - codestar-connections:UseConnection
                  - codeconnections:UseConnection
                Resource: arn:aws:codeconnections:eu-west-1:843632604592:connection/0dedd531-9e2f-4d4d-822f-b5fd9d52b0e0
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: '*'
                Condition:
                  StringEqualsIfExists:
                    iam:PassedToService:
                      - ecs-tasks.amazonaws.com
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-eventbridge-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: StartPipelinePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: codepipeline:StartPipelineExecution
                Resource: !Sub arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:${ProjectName}-pipeline
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # Using the existing available GitHub connection from the account
  # arn:aws:codeconnections:eu-west-1:843632604592:connection/0dedd531-9e2f-4d4d-822f-b5fd9d52b0e0

  # CodePipeline
  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Sub ${ProjectName}-pipeline
      RoleArn: !GetAtt CodePipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Sub ${ProjectName}-artifacts-${AWS::AccountId}
      Stages:
        - Name: Source
          Actions:
            - Name: ECRSource
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: ECR
                Version: '1'
              Configuration:
                RepositoryName: !Ref ProjectName
                ImageTag: latest
              OutputArtifacts:
                - Name: ECROutput
              RunOrder: 1
            - Name: GitHubSource
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: '1'
              Configuration:
                ConnectionArn: arn:aws:codeconnections:eu-west-1:843632604592:connection/0dedd531-9e2f-4d4d-822f-b5fd9d52b0e0
                FullRepositoryId: !Sub ${GitHubOrg}/${GitHubRepo}
                BranchName: main
                OutputArtifactFormat: CODE_ZIP
              OutputArtifacts:
                - Name: GitOutput
              RunOrder: 1
        - Name: Deploy
          Actions:
            - Name: BlueGreenDeploy
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CodeDeployToECS
                Version: '1'
              Configuration:
                ApplicationName: !Ref CodeDeployApp
                DeploymentGroupName: !Ref CodeDeployDeploymentGroup
                TaskDefinitionTemplateArtifact: GitOutput
                TaskDefinitionTemplatePath: taskdef.json
                AppSpecTemplateArtifact: GitOutput
                AppSpecTemplatePath: appspec.yml
                Image1ArtifactName: ECROutput
                Image1ContainerName: photo-uploader
              InputArtifacts:
                - Name: ECROutput
                - Name: GitOutput
              RunOrder: 1
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # EventBridge rule: ECR image push → trigger pipeline
  ECRPushRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub ${ProjectName}-ecr-push-rule
      Description: Trigger CodePipeline when a new image is pushed to ECR
      EventPattern:
        source:
          - aws.ecr
        detail-type:
          - ECR Image Action
        detail:
          action-type:
            - PUSH
          result:
            - SUCCESS
          repository-name:
            - !Ref ProjectName
          image-tag:
            - latest
      State: ENABLED
      Targets:
        - Id: TriggerPipeline
          Arn: !Sub arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:${ProjectName}-pipeline
          RoleArn: !GetAtt EventBridgeRole.Arn

Outputs:
  PipelineName:
    Value: !Ref Pipeline
    Export:
      Name: !Sub ${ProjectName}-PipelineName

  CodeDeployAppName:
    Value: !Ref CodeDeployApp
    Export:
      Name: !Sub ${ProjectName}-CodeDeployApp

  CodeDeployDeploymentGroupName:
    Value: !Ref CodeDeployDeploymentGroup
    Export:
      Name: !Sub ${ProjectName}-CodeDeployDG
