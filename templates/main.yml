AWSTemplateFormatVersion: '2010-09-09'
Description: Root stack - Photo Uploader (nested stacks)

Parameters:
  ProjectName:
    Type: String
    Default: photo-uploader
  Environment:
    Type: String
    Default: prod
    AllowedValues: [prod, staging]
  GitHubOrg:
    Type: String
    Description: GitHub org/username owning the app repository
  GitHubRepo:
    Type: String
    Description: App repository name
  ContainerImage:
    Type: String
    Default: public.ecr.aws/docker/library/node:20-alpine
    Description: >
      Initial container image for ECS. Use the placeholder default for the very
      first deploy. After GitHub Actions pushes the real image to ECR, CodeDeploy
      manages all subsequent deployments — this parameter is never updated again.
  TemplatesBucketName:
    Type: String
    Description: S3 bucket containing the uploaded nested template files
  DeployPipeline:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: >
      Set to "true" only after an image exists in ECR with the "latest" tag.
      CodePipeline CreatePipeline validates the ECR image exists at creation time.
      Phase 1: deploy with "false". Push seed image to ECR. Phase 2: set to "true".

Conditions:
  CreatePipeline: !Equals [!Ref DeployPipeline, "true"]

Resources:
  VPCStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub https://${TemplatesBucketName}.s3.${AWS::Region}.amazonaws.com/templates/vpc.yml
      Parameters:
        ProjectName: !Ref ProjectName
        Environment: !Ref Environment
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  S3CloudFrontStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub https://${TemplatesBucketName}.s3.${AWS::Region}.amazonaws.com/templates/s3-cloudfront.yml
      Parameters:
        ProjectName: !Ref ProjectName
        Environment: !Ref Environment
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  SecurityGroupsStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: VPCStack
    Properties:
      TemplateURL: !Sub https://${TemplatesBucketName}.s3.${AWS::Region}.amazonaws.com/templates/security-groups.yml
      Parameters:
        ProjectName: !Ref ProjectName
        Environment: !Ref Environment
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  RDSStack:
    Type: AWS::CloudFormation::Stack
    DependsOn:
      - VPCStack
      - SecurityGroupsStack
    Properties:
      TemplateURL: !Sub https://${TemplatesBucketName}.s3.${AWS::Region}.amazonaws.com/templates/rds.yml
      Parameters:
        ProjectName: !Ref ProjectName
        Environment: !Ref Environment
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  ECRStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub https://${TemplatesBucketName}.s3.${AWS::Region}.amazonaws.com/templates/ecr.yml
      Parameters:
        ProjectName: !Ref ProjectName
        GitHubOrg: !Ref GitHubOrg
        GitHubRepo: !Ref GitHubRepo
        Environment: !Ref Environment
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  ECSStack:
    Type: AWS::CloudFormation::Stack
    DependsOn:
      - VPCStack
      - SecurityGroupsStack
      - RDSStack
      - S3CloudFrontStack
      - ECRStack
    Properties:
      TemplateURL: !Sub https://${TemplatesBucketName}.s3.${AWS::Region}.amazonaws.com/templates/ecs.yml
      Parameters:
        ProjectName: !Ref ProjectName
        Environment: !Ref Environment
        ContainerImage: !Ref ContainerImage
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  CodePipelineStack:
    Type: AWS::CloudFormation::Stack
    Condition: CreatePipeline
    DependsOn:
      - ECSStack
      - ECRStack
      - S3CloudFrontStack
    Properties:
      TemplateURL: !Sub https://${TemplatesBucketName}.s3.${AWS::Region}.amazonaws.com/templates/codepipeline.yml
      Parameters:
        ProjectName: !Ref ProjectName
        Environment: !Ref Environment
        GitHubOrg: !Ref GitHubOrg
        GitHubRepo: !Ref GitHubRepo
      Tags:
        - Key: Project
          Value: !Ref ProjectName

Outputs:
  ALBEndpoint:
    Description: Application Load Balancer DNS name
    Value: !GetAtt ECSStack.Outputs.ALBDnsName

  CloudFrontDomain:
    Description: CloudFront distribution domain
    Value: !GetAtt S3CloudFrontStack.Outputs.CloudFrontDomain

  ECRRepositoryUri:
    Description: ECR repository URI
    Value: !GetAtt ECRStack.Outputs.ECRRepositoryUri

  GitHubActionsRoleArn:
    Description: ARN for the GitHub Actions OIDC role
    Value: !GetAtt ECRStack.Outputs.GitHubActionsRoleArn
